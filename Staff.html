<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiPixelMC | Staff</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* (Usa lo stesso CSS della Home per Nav e Root) */
        :root { --primary: #00d4ff; --dark-bg: #050a15; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: white; text-align: center; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; background: #050a15; border-bottom: 2px solid var(--primary); }
        .nav-links { display: flex; list-style: none; gap: 20px; }
        .nav-links a { text-decoration: none; color: white; }
        
        .container { padding: 50px 8%; }
        .staff-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 60px; }
        .staff-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border-bottom: 3px solid var(--primary); }
        .staff-card img { width: 80px; margin-bottom: 10px; }

        .apply-section { background: #0d1626; padding: 40px; border-radius: 20px; border: 1px dashed var(--primary); }
        .btn-apply { display: inline-block; background: var(--primary); color: #050a15; padding: 15px 30px; border-radius: 10px; text-decoration: none; font-weight: 800; margin-top: 20px; transition: 0.3s; }
        .btn-apply:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--primary); }
    </style>
</head>
<body>
    <nav>
        <div class="logo">MiPixel<span>MC</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="staff.html">Staff & Moduli</a></li>
            <li><a href="regole.html">Regole</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2>Il nostro <span>Staff</span></h2><br>
        <div class="staff-grid">
            <div class="staff-card">
                <img src="https://mc-heads.net/body/Notch" alt="Owner">
                <h3>NomeOwner</h3>
                <p style="color: #ff4757;">Founder</p>
            </div>
            </div>

        <div class="apply-section">
            <h2>Vuoi aiutarci? <span>Candidati!</span></h2>
            <p>Sei un esperto di moderazione o un bravo builder? Scegli il tuo ruolo.</p>
            <a href="https://forms.google.com/tuo-link-helper" class="btn-apply">MODULO HELPER</a>
            <a href="https://forms.google.com/tuo-link-builder" class="btn-apply" style="background: #00ff88;">MODULO BUILDER</a>
        </div>
    </div>
</body>
</html>
